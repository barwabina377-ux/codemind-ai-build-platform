version: '3.8'

services:
  cloud-build-platform:
    build: 
      context: .
      dockerfile: Dockerfile
    image: codemind/build-platform:latest
    container_name: codemind-platform
    ports:
      - "3000:3000"
    volumes:
      # Bind mount Docker socket so the Node.js backend can spawn build containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Persistent storage for artifacts and logs
      - platform_storage:/app/cloud_storage
    environment:
      - NODE_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: unless-stopped

volumes:
  platform_storage:
